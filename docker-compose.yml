version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: focus-engine-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: focusengine
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    container_name: focus-engine-redis
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: focus-engine-meilisearch
    environment:
      - MEILI_MASTER_KEY=meili_master_key
      - MEILI_NO_ANALYTICS=true
    ports:
      - "7700:7700"
    volumes:
      - ./data/meili:/meili_data

  web:
    build:
      context: ./web
    container_name: focus-engine-web
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - meilisearch
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/focusengine
      - REDIS_URL=redis://redis:6379
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILI_MASTER_KEY=meili_master_key
      - JWT_SECRET=supersecretjwtkey

  crawler:
    build:
      context: ./crawler
    container_name: focus-engine-crawler
    restart: always
    depends_on:
      - postgres
      - redis
      - meilisearch
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/focusengine
      - REDIS_URL=redis://redis:6379
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILI_MASTER_KEY=meili_master_key

  crawler_new:
    build:
      context: ./crawler_new
    container_name: focus-engine-crawler-new
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/focusengine
      - REDIS_URL=redis://redis:6379

